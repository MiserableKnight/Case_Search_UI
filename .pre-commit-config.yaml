repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files
        args: ['--maxkb=5000']

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
    -   id: ruff
        args: [--fix]
    -   id: ruff-format

# mypy 改用项目虚拟环境运行（language: system），使钩子和 pyproject.toml 中的
# mypy 配置共用同一份依赖与类型存根。此前 mirrors-mypy 的隔离环境缺少 pandas/
# werkzeug 等依赖，报错口径与项目配置互相矛盾（如 type: ignore 一边判多余、一边必需）。
-   repo: local
    hooks:
    -   id: mypy
        name: mypy
        entry: .venv/Scripts/python.exe -m mypy
        language: system
        types: [python]
